    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        * { font-family: 'Noto Sans SC', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
        .metric-card { background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%); border: 1px solid rgba(226,232,240,0.8); transition: all 0.3s ease; }
        .metric-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .rank-badge { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; font-size: 13px; }
        .rank-1 { background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%); color: #744210; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%); color: #4a5568; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); color: #744210; }
        .rank-other { background: #e2e8f0; color: #64748b; }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .product-img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; background: #f1f5f9; }
        .expand-row { background: #f8fafc; }
        .expand-row td { padding: 8px 16px !important; }
        .channel-tag-sm { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    </style>
</head>

        // 从SKU数据聚合生成SPU数据
        function buildSpuData() {
            return spuDefinitions.map(def => {
                const skus = skuData.filter(s => def.skuCodes.includes(s.skuCode));
                const salesAmount = skus.reduce((sum, s) => sum + s.salesAmount, 0);
                const salesQty = skus.reduce((sum, s) => sum + s.salesQty, 0);
                const paidAmount = skus.reduce((sum, s) => sum + s.paidAmount, 0);
                const paidQty = skus.reduce((sum, s) => sum + s.paidQty, 0);
                const spotStock = skus.reduce((sum, s) => sum + s.spotStock, 0);
                const purchaseInTransit = skus.reduce((sum, s) => sum + s.purchaseInTransit, 0);

                // 退款率按金额加权平均
                const preRefundRate = salesAmount > 0 ? skus.reduce((sum, s) => sum + s.preRefundRate * s.salesAmount, 0) / salesAmount : 0;
                const postRefundRate = salesAmount > 0 ? skus.reduce((sum, s) => sum + s.postRefundRate * s.salesAmount, 0) / salesAmount : 0;
                const spotRefundRate = salesAmount > 0 ? skus.reduce((sum, s) => sum + s.spotRefundRate * s.salesAmount, 0) / salesAmount : 0;
                const preSaleRefundRate = salesAmount > 0 ? skus.reduce((sum, s) => sum + s.preSaleRefundRate * s.salesAmount, 0) / salesAmount : 0;

                // 渠道数据聚合
                const channels = {};
                ['douyin', 'tmall', 'wechat'].forEach(ch => {
                    const chSkus = skus.filter(s => s.channels[ch].amount !== 0);
                    const chAmount = chSkus.reduce((sum, s) => sum + s.channels[ch].amount, 0);
                    const chQty = chSkus.reduce((sum, s) => sum + s.channels[ch].qty, 0);
                    const chPaidAmount = chSkus.reduce((sum, s) => sum + s.channels[ch].paidAmount, 0);
                    const chPaidQty = chSkus.reduce((sum, s) => sum + s.channels[ch].paidQty, 0);
                    const chPreRefundRate = chAmount > 0 ? chSkus.reduce((sum, s) => sum + s.channels[ch].preRefundRate * Math.max(0, s.channels[ch].amount), 0) / Math.max(0, chSkus.reduce((sum, s) => sum + Math.max(0, s.channels[ch].amount), 0)) : 0;
                    const chPostRefundRate = chAmount > 0 ? chSkus.reduce((sum, s) => sum + s.channels[ch].postRefundRate * Math.max(0, s.channels[ch].amount), 0) / Math.max(0, chSkus.reduce((sum, s) => sum + Math.max(0, s.channels[ch].amount), 0)) : 0;
                    const chSpotRefundRate = chAmount > 0 ? chSkus.reduce((sum, s) => sum + s.channels[ch].spotRefundRate * Math.max(0, s.channels[ch].amount), 0) / Math.max(0, chSkus.reduce((sum, s) => sum + Math.max(0, s.channels[ch].amount), 0)) : 0;
                    const chPreSaleRefundRate = chAmount > 0 ? chSkus.reduce((sum, s) => sum + s.channels[ch].preSaleRefundRate * Math.max(0, s.channels[ch].amount), 0) / Math.max(0, chSkus.reduce((sum, s) => sum + Math.max(0, s.channels[ch].amount), 0)) : 0;
                    channels[ch] = { amount: chAmount, qty: chQty, paidAmount: chPaidAmount, paidQty: chPaidQty, preRefundRate: parseFloat(chPreRefundRate.toFixed(1)), postRefundRate: parseFloat(chPostRefundRate.toFixed(1)), spotRefundRate: parseFloat(chSpotRefundRate.toFixed(1)), preSaleRefundRate: parseFloat(chPreSaleRefundRate.toFixed(1)) };
                });

                return {
                    id: def.id, spuCode: def.spuCode, douyinId: def.douyinId, name: def.name, category: def.category,
                    skuCount: skus.length, skus: def.skuCodes,

                    spotStock, purchaseInTransit, channels
                };
            });

                if (p.channels.tmall.amount > 0) channelTags.push('<span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs ' + channelMeta.tmall.tagClass + '">猫</span>');
                if (p.channels.wechat.amount > 0) channelTags.push('<span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs ' + channelMeta.wechat.tagClass + '">微</span>');

                const stockClass = p.spotStock < 30 ? 'text-rose-500' : p.spotStock < 50 ? 'text-amber-500' : 'text-emerald-500';
                const transitClass = p.purchaseInTransit > 50 ? 'text-emerald-500' : p.purchaseInTransit > 30 ? 'text-amber-500' : 'text-slate-500';

                const hasChannels = Object.keys(p.channels).some(key => p.channels[key].amount > 0);
                const isExpanded = expandedRows['sku-' + p.id] || false;
                const expandIcon = hasChannels ? '<span id="icon-sku-' + p.id + '" class="inline-block text-xs text-slate-400 mr-1 cursor-pointer select-none" onclick="event.stopPropagation(); toggleExpand(\'sku-' + p.id + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</span>' : '';

                html += '<tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors cursor-pointer" onclick="' + (hasChannels ? 'toggleExpand(\'sku-' + p.id + '\')' : '') + '">';
                html += '<td class="py-3"><div class="rank-badge ' + rankClass + '">' + expandIcon + (index + 1) + '</div></td>';
                html += '<td class="py-3"><div class="flex items-center gap-3"><img src="' + getProductImg() + '" alt="' + p.name + '" class="product-img"><div><div class="font-medium text-slate-800">' + p.name + '</div><div class="flex items-center gap-2 mt-0.5"><span class="text-xs text-slate-500">' + p.color + '</span><span class="text-xs text-slate-400">|</span><span class="text-xs text-slate-400">' + p.skuCode + '</span></div></div></div></td>';
                html += '<td class="py-3 text-right font-semibold">\u00A5' + p.salesAmount.toLocaleString() + '</td>';
                html += '<td class="py-3 text-right text-slate-600">' + p.salesQty + '</td>';
                html += '<td class="py-3 text-right font-semibold text-teal-600">\u00A5' + p.paidAmount.toLocaleString() + '</td>';
                html += '<td class="py-3 text-right text-teal-600">' + p.paidQty + '</td>';
                html += '<td class="py-3 text-right"><span class="text-rose-500">' + p.preRefundRate + '%</span></td>';
                html += '<td class="py-3 text-right"><span class="text-rose-500">' + p.postRefundRate + '%</span></td>';
                html += '<td class="py-3 text-right"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + refundRateClass + '">' + totalRefundRate + '%</span></td>';
                html += '<td class="py-3 text-right"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + spotRefundClass + '">' + p.spotRefundRate + '%</span></td>';
                html += '<td class="py-3 text-right"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + preSaleRefundClass + '">' + p.preSaleRefundRate + '%</span></td>';
                html += '<td class="py-3 text-right font-medium ' + stockClass + '">' + p.spotStock + '</td>';
                html += '<td class="py-3 text-right font-medium ' + transitClass + '">' + p.purchaseInTransit + '</td>';
                html += '<td class="py-3 text-center"><div class="flex justify-center gap-1">' + channelTags.join('') + '</div></td>';
                html += '</tr>';

                // 展开行：渠道明细
                if (hasChannels) {
                    html += '<tr><td colspan="14" class="p-0" style="display:' + (isExpanded ? '' : 'none') + ';" id="expand-sku-' + p.id + '">';
                    html += '<div class="expand-row">';
                    ['douyin', 'tmall', 'wechat'].forEach(key => {
                        const ch = p.channels[key];
                        if (ch.amount <= 0) return;
                        const chTotalRefund = calcTotalRefundRate(ch.preRefundRate, ch.postRefundRate);
                        const chRefundClass = parseFloat(chTotalRefund) > 25 ? 'bg-rose-50 text-rose-600' : parseFloat(chTotalRefund) > 18 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600';
                        const chSpotClass = parseFloat(ch.spotRefundRate) > 20 ? 'bg-rose-50 text-rose-600' : parseFloat(ch.spotRefundRate) > 12 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600';
                        const chPreSaleClass = parseFloat(ch.preSaleRefundRate) > 30 ? 'bg-rose-50 text-rose-600' : parseFloat(ch.preSaleRefundRate) > 22 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600';
                        html += '<div class="flex items-center text-xs border-b border-slate-100 last:border-b-0">';
                        html += '<div class="w-12 text-center"></div>';
                        html += '<div class="flex-1 min-w-[200px] pl-4"><span class="channel-tag-sm ' + channelMeta[key].tagClass + '">' + channelMeta[key].label + '</span></div>';
                        html += '<div class="w-24 text-right pr-4 font-medium text-slate-700">\u00A5' + ch.amount.toLocaleString() + '</div>';
                        html += '<div class="w-20 text-right pr-4 text-slate-600">' + ch.qty + '</div>';
                        html += '<div class="w-24 text-right pr-4 font-medium text-teal-600">\u00A5' + ch.paidAmount.toLocaleString() + '</div>';
                        html += '<div class="w-20 text-right pr-4 text-teal-600">' + ch.paidQty + '</div>';
                        html += '<div class="w-20 text-right pr-4 text-rose-500">' + ch.preRefundRate + '%</div>';
                        html += '<div class="w-20 text-right pr-4 text-rose-500">' + ch.postRefundRate + '%</div>';
                        html += '<div class="w-20 text-right pr-4"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + chRefundClass + '">' + chTotalRefund + '%</span></div>';
                        html += '<div class="w-20 text-right pr-4"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + chSpotClass + '">' + ch.spotRefundRate + '%</span></div>';
                        html += '<div class="w-20 text-right pr-4"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + chPreSaleClass + '">' + ch.preSaleRefundRate + '%</span></div>';
                        html += '<div class="w-20 text-right pr-4 text-slate-400">-</div>';
                        html += '<div class="w-20 text-right pr-4 text-slate-400">-</div>';
                        html += '<div class="w-16 text-center"></div>';
                        html += '</div>';
                    });
                    html += '</div></td></tr>';
                }
            });

            tbody.innerHTML = html;
        }

        // 筛选商品数据
        function filterProductData() {
            Object.keys(expandedRows).forEach(k => delete expandedRows[k]);
            renderCurrentTable();
        }

        // 导出商品数据
        function exportProductData() {
            const filter = document.getElementById('product-shop-filter').value;
            if (currentDimension === 'spu') {
                exportSpuData(filter);
            } else {
                exportSkuData(filter);
            }
        }

        function exportSpuData(filter = 'all') {
            let filteredData = spuData;
            if (filter === 'douyin') filteredData = filteredData.filter(p => p.channels.douyin.amount > 0);
            if (filter === 'tmall') filteredData = filteredData.filter(p => p.channels.tmall.amount > 0);
            if (filter === 'wechat') filteredData = filteredData.filter(p => p.channels.wechat.amount > 0);
            const douyinIds = parseSearchValues(spuSearchDouyinId);
            const codes = parseSearchValues(spuSearchCode);
            if (douyinIds.length > 0 || codes.length > 0) {
                filteredData = filteredData.filter(p => {
                    const matchDouyin = douyinIds.length === 0 || douyinIds.some(id => p.douyinId === id);
                    const matchCode = codes.length === 0 || codes.some(c => p.spuCode === c);
                    return matchDouyin || matchCode;
                });
            }
            const sortedData = [...filteredData].sort((a, b) => b.salesAmount - a.salesAmount);
            const headers = ['排名', '货号', '抖音ID', '商品名称', '品类', 'SKU数量', '销售金额', '销售件数', '实付金额', '实付件数', '售前退款率', '售后退款率', '总退款率', '现货退款率', '预售退款率', '现货库存', '采购在途', '抖音金额', '抖音件数', '天猫金额', '天猫件数', '微信金额', '微信件数'];
            const rows = sortedData.map((p, index) => [index + 1, p.spuCode, p.douyinId, p.name, p.category, p.skuCount, p.salesAmount, p.salesQty, p.paidAmount, p.paidQty, p.preRefundRate + '%', p.postRefundRate + '%', calcTotalRefundRate(p.preRefundRate, p.postRefundRate) + '%', p.spotRefundRate + '%', p.preSaleRefundRate + '%', p.spotStock, p.purchaseInTransit, p.channels.douyin.amount, p.channels.douyin.qty, p.channels.tmall.amount, p.channels.tmall.qty, p.channels.wechat.amount, p.channels.wechat.qty]);
            const totals = sortedData.reduce((acc, p) => ({ salesAmount: acc.salesAmount + p.salesAmount, salesQty: acc.salesQty + p.salesQty, paidAmount: acc.paidAmount + p.paidAmount, paidQty: acc.paidQty + p.paidQty, spotStock: acc.spotStock + p.spotStock, purchaseInTransit: acc.purchaseInTransit + p.purchaseInTransit, douyinAmount: acc.douyinAmount + p.channels.douyin.amount, douyinQty: acc.douyinQty + p.channels.douyin.qty, tmallAmount: acc.tmallAmount + p.channels.tmall.amount, tmallQty: acc.tmallQty + p.channels.tmall.qty, wechatAmount: acc.wechatAmount + p.channels.wechat.amount, wechatQty: acc.wechatQty + p.channels.wechat.qty }), { salesAmount:0, salesQty:0, paidAmount:0, paidQty:0, spotStock:0, purchaseInTransit:0, douyinAmount:0, douyinQty:0, tmallAmount:0, tmallQty:0, wechatAmount:0, wechatQty:0 });
            rows.push(['合计', '', '', '', '', '', totals.salesAmount, totals.salesQty, totals.paidAmount, totals.paidQty, '', '', '', '', '', totals.spotStock, totals.purchaseInTransit, totals.douyinAmount, totals.douyinQty, totals.tmallAmount, totals.tmallQty, totals.wechatAmount, totals.wechatQty]);
            const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '商品SPU销售数据_' + new Date().toLocaleDateString('zh-CN') + '.csv';
            link.click();
        }

        function exportSkuData(filter = 'all') {
            let filteredData = skuData;
            if (filter === 'douyin') filteredData = filteredData.filter(p => p.channels.douyin.amount > 0);
            if (filter === 'tmall') filteredData = filteredData.filter(p => p.channels.tmall.amount > 0);
            if (filter === 'wechat') filteredData = filteredData.filter(p => p.channels.wechat.amount > 0);
            const searchVals = parseSearchValues(skuSearchCodes);
            if (searchVals.length > 0) {
                filteredData = filteredData.filter(p => searchVals.some(v => p.skuCode === v));
            }
            const sortedData = [...filteredData].sort((a, b) => b.salesAmount - a.salesAmount);
            const headers = ['排名', 'SKU编码', '所属SPU货号', '商品名称', '颜色', '品类', '销售金额', '销售件数', '实付金额', '实付件数', '售前退款率', '售后退款率', '总退款率', '现货退款率', '预售退款率', '现货库存', '采购在途', '抖音金额', '抖音件数', '天猫金额', '天猫件数', '微信金额', '微信件数'];
            const rows = sortedData.map((p, index) => [index + 1, p.skuCode, getSpuCodeForSku(p.skuCode), p.name, p.color, p.category, p.salesAmount, p.salesQty, p.paidAmount, p.paidQty, p.preRefundRate + '%', p.postRefundRate + '%', calcTotalRefundRate(p.preRefundRate, p.postRefundRate) + '%', p.spotRefundRate + '%', p.preSaleRefundRate + '%', p.spotStock, p.purchaseInTransit, p.channels.douyin.amount, p.channels.douyin.qty, p.channels.tmall.amount, p.channels.tmall.qty, p.channels.wechat.amount, p.channels.wechat.qty]);
            const totals = sortedData.reduce((acc, p) => ({ salesAmount: acc.salesAmount + p.salesAmount, salesQty: acc.salesQty + p.salesQty, paidAmount: acc.paidAmount + p.paidAmount, paidQty: acc.paidQty + p.paidQty, spotStock: acc.spotStock + p.spotStock, purchaseInTransit: acc.purchaseInTransit + p.purchaseInTransit, douyinAmount: acc.douyinAmount + p.channels.douyin.amount, douyinQty: acc.douyinQty + p.channels.douyin.qty, tmallAmount: acc.tmallAmount + p.channels.tmall.amount, tmallQty: acc.tmallQty + p.channels.tmall.qty, wechatAmount: acc.wechatAmount + p.channels.wechat.amount, wechatQty: acc.wechatQty + p.channels.wechat.qty }), { salesAmount:0, salesQty:0, paidAmount:0, paidQty:0, spotStock:0, purchaseInTransit:0, douyinAmount:0, douyinQty:0, tmallAmount:0, tmallQty:0, wechatAmount:0, wechatQty:0 });
            rows.push(['合计', '', '', '', '', '', totals.salesAmount, totals.salesQty, totals.paidAmount, totals.paidQty, '', '', '', '', '', totals.spotStock, totals.purchaseInTransit, totals.douyinAmount, totals.douyinQty, totals.tmallAmount, totals.tmallQty, totals.wechatAmount, totals.wechatQty]);
            const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '商品SKU销售数据_' + new Date().toLocaleDateString('zh-CN') + '.csv';
            link.click();
        }

        // 初始化商品看板表格
        renderSpuTable();

    </script>
</body>
</html>
